<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strava no conectado — DreamTeam Chile</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:92vh;text-align:center;padding:20px;color:#1a1a1a;background:#fff}
  .c{max-width:420px}.e{font-size:64px;margin-bottom:8px}
  h1{font-size:1.35rem;margin:8px 0}p{color:#666;line-height:1.5}
  code{background:#f5f5f5;padding:3px 8px;border-radius:6px;font-size:13px;color:#C62828}
</style>
</head>
<body>
<div class="c">
  <div class="e">⚠️</div>
  <h1>No se pudo conectar Strava</h1>
  <p>Vuelve a la app e intenta de nuevo. Si el problema persiste, avísale al administrador con este código:</p>
  <p><code id="motivo">desconocido</code></p>
</div>
<script>
  const r = new URLSearchParams(location.search).get('r');
  if (r) document.getElementById('motivo').textContent = r;
</script>
</body>
</html>
